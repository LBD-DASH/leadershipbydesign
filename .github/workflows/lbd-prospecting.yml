name: LBD Prospecting Engine

on:
  schedule:
    # Phase 1: Daily 07:00 SAST (05:00 UTC) — Search + Score + Queue
    - cron: '3 5 * * *'
    # Nurture: Every 30 min 06:00-18:00 SAST (04:00-16:00 UTC) — Process diagnostic follow-ups
    - cron: '*/30 4-16 * * *'
    # Phase 4: Every 4 hours — Monitor call results + next actions
    - cron: '7 8,12,16,20 * * *'
    # Phase 6: Daily 20:30 SAST (18:30 UTC) — Evening dashboard
    - cron: '33 18 * * *'
    # Health: 09:00 + 18:00 SAST (07:00 + 16:00 UTC) — System heartbeat
    - cron: '0 7,16 * * *'
    # Weekly: Sunday 19:00 SAST (17:00 UTC) — Weekly report
    - cron: '2 17 * * 0'
    # Apollo List Builder: Sunday 18:00 SAST (16:00 UTC)
    - cron: '0 16 * * 0'
    # Win/Loss Tracker: Daily 17:00 SAST (15:00 UTC)
    - cron: '0 15 * * *'
    # Stale Lead Re-engager: Wednesday 09:00 SAST (07:00 UTC)
    - cron: '0 7 * * 3'
    # Blog Repurposer: Thursday 20:00 SAST (18:00 UTC)
    - cron: '0 18 * * 4'
    # Newsletter Curator: Sunday 16:00 SAST (14:00 UTC)
    - cron: '0 14 * * 0'
    # Competitor Monitor: Monday 06:00 SAST (04:00 UTC)
    - cron: '0 4 * * 1'
    # Conversion Tracker: Daily 19:00 SAST (17:00 UTC)
    - cron: '0 17 * * *'
    # Deliverability Monitor: Daily 10:00 + 16:00 SAST (08:00 + 14:00 UTC)
    - cron: '0 8,14 * * *'
    # Outreach Optimizer: Sunday 20:00 SAST (18:00 UTC) — weekly learning cycle
    - cron: '0 18 * * 0'
    # Performance Dashboard: Daily 18:30 SAST (16:30 UTC)
    - cron: '30 16 * * *'
    # COO Agent: Daily 08:00 SAST (06:00 UTC) — Morning brief
    - cron: '0 6 * * *'
    # CFO Agent: Sunday 19:00 SAST (17:00 UTC) — Weekly financial report
    - cron: '5 17 * * 0'
  workflow_dispatch:
    inputs:
      phase:
        description: 'Phase to run'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - 'nurture'
          - '4'
          - '6'
          - 'health'
          - 'weekly'
          - 'agents'
          - 'intelligence'
          - 'executive'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  phase1-prospect:
    if: >
      (github.event.schedule == '3 5 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.phase == '1')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Phase 1 — Search + Queue
        run: |
          echo "Phase 1: Searching Apollo and inserting into outreach_queue"
          # Call the existing Supabase edge functions which handle Apollo search
          curl -s -X POST "$SUPABASE_URL/functions/v1/web-scraper-leads" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' || true

          # Trigger pipeline self-check
          curl -s -X POST "$SUPABASE_URL/functions/v1/pipeline-self-check" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' || true

          # Trigger auto-outreach for pending prospects
          curl -s -X POST "$SUPABASE_URL/functions/v1/auto-outreach" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' || true

          echo "Phase 1 complete"

  nurture-sequences:
    if: >
      (github.event.schedule == '*/30 4-16 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.phase == 'nurture')
    runs-on: ubuntu-latest
    steps:
      - name: Run Nurture — Process diagnostic follow-up emails
        run: |
          echo "Nurture: Processing diagnostic email sequences"

          # Process diagnostic nurture sequences (5-step emails for all diagnostic types)
          NURTURE_RESULT=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/functions/v1/process-diagnostic-nurture" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          NURTURE_STATUS=$(echo "$NURTURE_RESULT" | tail -1)
          NURTURE_BODY=$(echo "$NURTURE_RESULT" | head -n -1)
          echo "process-diagnostic-nurture: HTTP $NURTURE_STATUS"
          echo "$NURTURE_BODY"

          # Process LAC-specific follow-up sequences
          LAC_RESULT=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/functions/v1/lac-follow-up" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          LAC_STATUS=$(echo "$LAC_RESULT" | tail -1)
          LAC_BODY=$(echo "$LAC_RESULT" | head -n -1)
          echo "lac-follow-up: HTTP $LAC_STATUS"
          echo "$LAC_BODY"

          # Process warm lead reminders
          curl -s -X POST "$SUPABASE_URL/functions/v1/process-warm-lead-reminders" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' || true

          # Process general follow-up sequences (prospect outreach)
          curl -s -X POST "$SUPABASE_URL/functions/v1/process-follow-up-sequences" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' || true

          echo "Nurture phase complete"

  phase4-monitor:
    if: >
      (github.event.schedule == '7 8,12,16,20 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.phase == '4')
    runs-on: ubuntu-latest
    steps:
      - name: Run Phase 4 — Monitor + Next Actions
        run: |
          echo "Phase 4: Monitoring call results and executing next actions"

          # Check outreach_queue for updated statuses
          RESULTS=$(curl -s "$SUPABASE_URL/rest/v1/outreach_queue?status=in.(interested,objection,no_answer,callback_scheduled)&next_action=is.null&select=id,name,company,status" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")

          echo "New results to process: $RESULTS"

          # For no_answer: set retry in 72h
          curl -s "$SUPABASE_URL/rest/v1/outreach_queue?status=eq.no_answer&next_action=is.null" \
            -X PATCH \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"next_action\":\"retry_call\",\"next_action_date\":\"$(date -u -d '+72 hours' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v+72H +%Y-%m-%dT%H:%M:%SZ)\",\"status\":\"pending_call\",\"scheduled_call_date\":\"$(date -u -d '+72 hours' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v+72H +%Y-%m-%dT%H:%M:%SZ)\"}" || true

          # For interested: set draft_proposal
          curl -s "$SUPABASE_URL/rest/v1/outreach_queue?status=eq.interested&next_action=is.null" \
            -X PATCH \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"next_action\":\"draft_proposal\",\"next_action_date\":\"$(date -u -d '+24 hours' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v+24H +%Y-%m-%dT%H:%M:%SZ)\"}" || true

          # Trigger gmail-reply-classifier
          curl -s -X POST "$SUPABASE_URL/functions/v1/gmail-reply-classifier" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' || true

          echo "Phase 4 complete"

  phase6-report:
    if: >
      (github.event.schedule == '33 18 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.phase == '6')
    runs-on: ubuntu-latest
    steps:
      - name: Run Phase 6 — Evening Dashboard
        run: |
          echo "Phase 6: Generating evening dashboard"

          # Get pipeline stats
          STATS=$(curl -s "$SUPABASE_URL/rest/v1/outreach_queue?select=status,tier,vertical,estimated_value" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")

          TOTAL=$(echo "$STATS" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d))" 2>/dev/null || echo "0")
          INTERESTED=$(echo "$STATS" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len([x for x in d if x['status']=='interested']))" 2>/dev/null || echo "0")
          PENDING=$(echo "$STATS" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len([x for x in d if x['status']=='pending_call']))" 2>/dev/null || echo "0")
          VALUE=$(echo "$STATS" | python3 -c "import json,sys; d=json.load(sys.stdin); print(sum(x.get('estimated_value',0) or 0 for x in d))" 2>/dev/null || echo "0")

          # Post to Slack via Supabase slack-notify
          curl -s -X POST "$SUPABASE_URL/functions/v1/slack-notify" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"mission-control\",\"eventType\":\"system_error\",\"data\":{\"function\":\"Pipeline Dashboard\",\"error\":\"Total: $TOTAL | Pending calls: $PENDING | Interested: $INTERESTED | Pipeline: R$VALUE\"}}" || true

          # Trigger system heartbeat
          curl -s -X POST "$SUPABASE_URL/functions/v1/system-heartbeat" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' || true

          echo "Phase 6 complete"

  health-check:
    if: >
      (github.event.schedule == '0 7,16 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.phase == 'health')
    runs-on: ubuntu-latest
    steps:
      - name: Run System Heartbeat
        run: |
          echo "Health check: Running system heartbeat"

          curl -s -X POST "$SUPABASE_URL/functions/v1/system-heartbeat" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' || true

          echo "Health check complete"

  weekly-report:
    if: >
      (github.event.schedule == '2 17 * * 0') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.phase == 'weekly')
    runs-on: ubuntu-latest
    steps:
      - name: Run Weekly Report
        run: |
          echo "Weekly report: Generating pipeline summary"

          STATS=$(curl -s "$SUPABASE_URL/rest/v1/outreach_queue?select=status,tier,vertical,estimated_value" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")

          TOTAL=$(echo "$STATS" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d))" 2>/dev/null || echo "0")
          VALUE=$(echo "$STATS" | python3 -c "import json,sys; d=json.load(sys.stdin); print(sum(x.get('estimated_value',0) or 0 for x in d))" 2>/dev/null || echo "0")

          curl -s -X POST "$SUPABASE_URL/functions/v1/slack-notify" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"mission-control\",\"eventType\":\"system_error\",\"data\":{\"function\":\"Weekly Pipeline Report\",\"error\":\"WEEKLY SUMMARY — Total prospects: $TOTAL | Pipeline value: R$VALUE\"}}" || true

          echo "Weekly report complete"

  # 6 specialist agents
  agents:
    if: >
      (github.event.schedule == '0 16 * * 0') ||
      (github.event.schedule == '0 15 * * *') ||
      (github.event.schedule == '0 7 * * 3') ||
      (github.event.schedule == '0 18 * * 4') ||
      (github.event.schedule == '0 14 * * 0') ||
      (github.event.schedule == '0 4 * * 1') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.phase == 'agents')
    runs-on: ubuntu-latest
    steps:
      - name: Run Specialist Agents
        run: |
          HOUR=$(date -u +%H)
          DOW=$(date -u +%u)

          # Apollo List Builder — Sunday 16:00 UTC
          if [ "$DOW" = "7" ] && [ "$HOUR" = "16" ] || [ "${{ github.event.inputs.phase }}" = "agents" ]; then
            echo "Running Apollo List Builder"
            curl -s -X POST "$SUPABASE_URL/functions/v1/apollo-list-builder" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' || true
          fi

          # Win/Loss Tracker — Daily 15:00 UTC
          if [ "$HOUR" = "15" ] || [ "${{ github.event.inputs.phase }}" = "agents" ]; then
            echo "Running Win/Loss Tracker"
            curl -s -X POST "$SUPABASE_URL/functions/v1/win-loss-tracker" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' || true
          fi

          # Stale Lead Re-engager — Wednesday 07:00 UTC
          if [ "$DOW" = "3" ] && [ "$HOUR" = "07" ] || [ "${{ github.event.inputs.phase }}" = "agents" ]; then
            echo "Running Stale Lead Re-engager"
            curl -s -X POST "$SUPABASE_URL/functions/v1/stale-lead-reengager" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' || true
          fi

          # Blog Repurposer — Thursday 18:00 UTC
          if [ "$DOW" = "4" ] && [ "$HOUR" = "18" ] || [ "${{ github.event.inputs.phase }}" = "agents" ]; then
            echo "Running Blog Repurposer"
            curl -s -X POST "$SUPABASE_URL/functions/v1/blog-repurposer" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' || true
          fi

          # Newsletter Curator — Sunday 14:00 UTC
          if [ "$DOW" = "7" ] && [ "$HOUR" = "14" ] || [ "${{ github.event.inputs.phase }}" = "agents" ]; then
            echo "Running Newsletter Curator"
            curl -s -X POST "$SUPABASE_URL/functions/v1/newsletter-curator" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' || true
          fi

          # Competitor Monitor — Monday 04:00 UTC
          if [ "$DOW" = "1" ] && [ "$HOUR" = "04" ] || [ "${{ github.event.inputs.phase }}" = "agents" ]; then
            echo "Running Competitor Monitor"
            curl -s -X POST "$SUPABASE_URL/functions/v1/competitor-monitor" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' || true
          fi

          echo "Specialist agents complete"

  # Intelligence layer — conversion tracking, deliverability, optimization, dashboard
  intelligence:
    if: >
      (github.event.schedule == '0 17 * * *') ||
      (github.event.schedule == '0 8,14 * * *') ||
      (github.event.schedule == '0 18 * * 0') ||
      (github.event.schedule == '30 16 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.phase == 'intelligence')
    runs-on: ubuntu-latest
    steps:
      - name: Run Intelligence Layer
        run: |
          HOUR=$(date -u +%H)
          DOW=$(date -u +%u)

          # Conversion Tracker — Daily 17:00 UTC
          if [ "$HOUR" = "17" ] || [ "${{ github.event.inputs.phase }}" = "intelligence" ]; then
            echo "Running Conversion Tracker"
            curl -s -X POST "$SUPABASE_URL/functions/v1/conversion-tracker" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' || true
          fi

          # Deliverability Monitor — 08:00 + 14:00 UTC
          if [ "$HOUR" = "08" ] || [ "$HOUR" = "14" ] || [ "${{ github.event.inputs.phase }}" = "intelligence" ]; then
            echo "Running Deliverability Monitor"
            curl -s -X POST "$SUPABASE_URL/functions/v1/deliverability-monitor" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' || true
          fi

          # Outreach Optimizer — Sunday 18:00 UTC
          if [ "$DOW" = "7" ] && [ "$HOUR" = "18" ] || [ "${{ github.event.inputs.phase }}" = "intelligence" ]; then
            echo "Running Outreach Optimizer"
            curl -s -X POST "$SUPABASE_URL/functions/v1/outreach-optimizer" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' || true
          fi

          # Performance Dashboard — Daily 16:30 UTC
          if [ "$HOUR" = "16" ] || [ "${{ github.event.inputs.phase }}" = "intelligence" ]; then
            echo "Running Performance Dashboard"
            curl -s -X POST "$SUPABASE_URL/functions/v1/performance-dashboard" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' || true
          fi

          echo "Intelligence layer complete"

  # Executive layer — COO daily brief + CFO weekly financial report
  executive:
    if: >
      (github.event.schedule == '0 6 * * *') ||
      (github.event.schedule == '5 17 * * 0') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.phase == 'executive')
    runs-on: ubuntu-latest
    steps:
      - name: Run Executive Agents
        run: |
          HOUR=$(date -u +%H)
          DOW=$(date -u +%u)

          # COO Agent — Daily 06:00 UTC (08:00 SAST)
          if [ "$HOUR" = "06" ] || [ "${{ github.event.inputs.phase }}" = "executive" ]; then
            echo "Running COO Daily Brief"
            curl -s -X POST "$SUPABASE_URL/functions/v1/coo-agent" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' || true
          fi

          # CFO Agent — Sunday 17:05 UTC (19:05 SAST)
          if [ "$DOW" = "7" ] || [ "${{ github.event.inputs.phase }}" = "executive" ]; then
            echo "Running CFO Financial Report"
            curl -s -X POST "$SUPABASE_URL/functions/v1/cfo-agent" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' || true
          fi

          echo "Executive layer complete"
