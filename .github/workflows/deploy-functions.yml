name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref fdtlljyfjdlrymfeguoa

      - name: Deploy all edge functions
        run: |
          echo "🚀 Deploying Supabase edge functions..."

          DEPLOYED=0
          FAILED=0
          FAILED_NAMES=""

          for dir in supabase/functions/*/; do
            func_name=$(basename "$dir")

            # Skip non-function directories
            if [[ "$func_name" == _* ]] || [[ "$func_name" == "shared" ]]; then
              continue
            fi

            # Must have an index.ts
            if [[ ! -f "$dir/index.ts" ]]; then
              continue
            fi

            echo "  📦 Deploying $func_name..."
            if supabase functions deploy "$func_name" --no-verify-jwt 2>&1; then
              DEPLOYED=$((DEPLOYED + 1))
              echo "  ✅ $func_name"
            else
              FAILED=$((FAILED + 1))
              FAILED_NAMES="$FAILED_NAMES $func_name"
              echo "  ❌ $func_name FAILED"
            fi
          done

          echo ""
          echo "🏁 Result: $DEPLOYED deployed, $FAILED failed"
          if [[ -n "$FAILED_NAMES" ]]; then
            echo "Failed:$FAILED_NAMES"
          fi

          # Only fail the job if ALL functions failed
          if [[ $DEPLOYED -eq 0 ]] && [[ $FAILED -gt 0 ]]; then
            echo "❌ All deployments failed"
            exit 1
          fi

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [[ "$STATUS" == "success" ]]; then
            MSG="✅ Edge functions deployed successfully from GitHub"
          else
            MSG="⚠️ Some edge function deployments failed — check GitHub Actions logs"
          fi

          curl -s -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/slack-notify" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"mission-control\",\"eventType\":\"system_error\",\"data\":{\"function\":\"Auto-Deploy\",\"error\":\"$MSG\"}}" || true
