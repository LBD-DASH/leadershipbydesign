        {

          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We offer three core team workshops: Alignment Workshop (clarity & direction), Motivation Workshop (energy & engagement), and Leadership Workshop (accountability & ownership). Each is 1-2 days and can be delivered in-person or virtually."
          }
        },
        {
          "@type": "Question",
          "name": "How do I know which leadership programme is right for me?",
          "acceptedAnswer": {
            "@type": "Answer",

          }

          "@type": "Question",
          "name": "What are the 5 levels of leadership in the Leadership Levels framework?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The 5 leadership levels are: L1 (Productivity) - focused on personal output and task completion; L2 (Development) - investing in growing others; L3 (Purpose) - connecting work to meaning and vision; L4 (Motivational) - inspiring and energising teams; L5 (Strategic) - driving long-term organisational success."
          }
        },
        {
          "@type": "Question",
          "name": "How much does leadership coaching cost in South Africa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Leadership coaching investment varies based on programme scope and duration. Executive coaching typically ranges from individual sessions to comprehensive 6-12 month programmes. Contact Leadership by Design for a customised quote based on your specific needs and objectives."
          }
        },
        {
          "@type": "Question",
          "name": "What makes Leadership by Design different from other coaching companies?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Leadership by Design uses the proprietary SHIFT Methodology, which focuses on measurable, observable skills that perform under pressure. We combine diagnostic assessments, personalised coaching, and team workshops for a comprehensive approach. Our programmes deliver measurable ROI with specific metrics like 35% faster decision-making and 50% reduction in team conflict."
          }
        },
        {
          "@type": "Question",
          "name": "Can leadership development be done virtually or online?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, all Leadership by Design programmes can be delivered virtually or in-person. Our team workshops, executive coaching, and leadership development programmes are equally effective in both formats, with interactive digital tools and assessments supporting remote delivery."
          }
        },
        {
          "@type": "Question",
          "name": "How do you measure the ROI of leadership development?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We measure leadership development ROI through specific, observable metrics including: decision-making speed (35% improvement), team conflict reduction (50%), strategic clarity (2x improvement), and employee engagement scores. Pre and post-programme assessments track individual and team progress."
          }
        },
        {
          "@type": "Question",
          "name": "What is a Team Diagnostic and how does it work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Team Diagnostic is a free 5-minute assessment that evaluates your team's performance across three key dimensions: Clarity (strategic alignment), Motivation (energy and engagement), and Leadership (accountability and ownership). It provides immediate results with specific workshop recommendations."
          }
        },
        {
          "@type": "Question",
          "name": "Who is Kevin Britz?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Kevin Britz is the founder of Leadership by Design, an executive coach and leadership development specialist based in South Africa. He developed the SHIFT Methodology and has helped hundreds of leaders and organisations achieve measurable improvements in leadership effectiveness and team performance."
